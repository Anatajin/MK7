fastcgi_cache_path /var/cache/nginx/sport_api_microcache levels=1:2 keys_zone=sport_api_microcache:100m inactive=30m max_size=1g use_temp_path=off;

log_format sport_api_metrics escape=json
    '{"time":"$time_iso8601","status":$status,"request_time":$request_time,'
    '"cache":"$upstream_cache_status","method":"$request_method","action":"$arg_action",'
    '"api_key":"$api_rate_key_primary","origin":"$http_origin","remote_addr":"$remote_addr","uri":"$uri"}';

map $request_method $api_method_cacheable {
    default 0;
    GET 1;
    HEAD 1;
}

map $http_x_api_key $api_rate_key_primary {
    default $http_x_api_key;
    "" $arg_api_key;
}

map $api_rate_key_primary $api_rate_key {
    default $api_rate_key_primary;
    "" $binary_remote_addr;
}

map $arg_action $api_action_cacheable {
    default 0;
    matches 1;
    match 1;
    teams 1;
    stats 1;
    news 1;
    standings 1;
    news_details 1;
    players 1;
    leagues 1;
    countries 1;
    leagues_standings 1;
}

map $arg_action $api_hot_action {
    default 0;
    matches 1;
    match 1;
    teams 1;
    stats 1;
    news 1;
    standings 1;
    news_details 1;
    players 1;
    leagues 1;
    countries 1;
    leagues_standings 1;
}

map $api_hot_action $api_hot_rate_key {
    default "";
    1 $api_rate_key;
}

map $api_hot_action $api_cold_rate_key {
    default $api_rate_key;
    1 "";
}

map $api_hot_action $api_hot_global_key {
    default "";
    1 api-hot-global;
}

map $api_hot_action $api_cold_global_key {
    default api-cold-global;
    1 "";
}

map $api_rate_key_primary $api_missing_key_ip {
    default "";
    "" $binary_remote_addr;
}

map $arg_nocache $api_qs_nocache {
    default 0;
    1 1;
}

map $arg_bypass_cache $api_qs_bypass_cache {
    default 0;
    1 1;
}

map $http_cache_control $api_header_nocache {
    default 0;
    "~*no-cache|no-store|max-age=0" 1;
}

map $http_pragma $api_header_pragma_nocache {
    default 0;
    "~*no-cache" 1;
}

map "$api_method_cacheable:$api_action_cacheable:$api_qs_nocache:$api_qs_bypass_cache:$api_header_nocache:$api_header_pragma_nocache" $api_microcache_bypass {
    default 1;
    "1:1:0:0:0:0" 0;
}

limit_req_zone $api_hot_rate_key zone=sport_api_hot_per_key:20m rate=350r/s;
limit_req_zone $api_cold_rate_key zone=sport_api_cold_per_key:20m rate=30r/s;
limit_req_zone $api_hot_global_key zone=sport_api_hot_global:1m rate=800r/s;
limit_req_zone $api_cold_global_key zone=sport_api_cold_global:1m rate=80r/s;
limit_req_zone $api_missing_key_ip zone=sport_api_missing_key_ip:10m rate=10r/s;
