server {
    listen 80;
    listen [::]:80;
    server_name hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;
    return 301 https://hayachoout.space$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;
    return 301 https://hayachoout.space$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;
    return 301 https://api.hayachoout.space$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.hayachoout.space;
    return 301 https://dashboard.hayachoout.space$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;

    root /var/www/hayyaweb;
    index index.php index.html index.htm;

    ssl_certificate /etc/letsencrypt/live/hayachoout.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hayachoout.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(sql|log|yml|yaml|env|ini|config)$ {
        return 404;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    rewrite ^/home$ /index.php last;
    rewrite ^/news$ /news.php last;
    rewrite ^/standings$ /standings.php last;
    rewrite ^/app$ /app.php last;
    rewrite ^/free-api$ /free-api.php last;
    rewrite ^/about$ /about.php last;
    rewrite ^/contact$ /contact.php last;
    rewrite ^/privacy$ /privacy.php last;
    rewrite ^/login/?$ /login/login.php last;
    rewrite ^/register/?$ /login/register.php last;
    rewrite ^/dashboard$ /dashboard/ last;
    rewrite ^/logout$ /login/logout.php last;
    rewrite ^/api$ /api.php last;
    rewrite ^/api-config$ /api-config.php last;
    location ~ ^/live-([a-z0-9-]+-vs-[a-z0-9-]+-[0-9][0-9]-[0-9][0-9]-[0-9][0-9][0-9][0-9])$ {
        rewrite ^/live-(.*)$ /match-details.php?slug=live-$1 last;
    }

    location ~ ^/news-([a-z0-9-]+)$ {
        rewrite ^/news-(.*)$ /news-details.php?slug=news-$1 last;
    }

    location ~ ^/standings-([a-z0-9-]+)$ {
        rewrite ^/standings-(.*)$ /standings.php?slug=standings-$1 last;
    }

    location / {
        try_files $uri $uri/ /404.php;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-hayyaweb.sock;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;

    ssl_certificate /etc/letsencrypt/live/hayachoout.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hayachoout.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hayachoout.space$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.hayachoout.space;
    include /var/www/html/.monitoring/blocked_ips.conf;

    root /var/www/html/api;
    index index.php get.php;

    ssl_certificate /etc/letsencrypt/live/hayachoout.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hayachoout.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    error_page 429 = @api_rate_limited;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location ~ ^/(config\.php|403\.php|package(?:-lock)?\.json)$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /get.php?$query_string;
    }

    location @api_rate_limited {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "1" always;
        return 429 '{"status":"error","message":"Rate limit exceeded. Please retry shortly."}';
    }

    location = /get.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-sport.sock;
        access_log /var/www/html/.monitoring/api_metrics.log sport_api_metrics;

        limit_req_status 429;
        limit_req_log_level warn;
        limit_req zone=sport_api_hot_per_key burst=700 nodelay;
        limit_req zone=sport_api_cold_per_key burst=60 nodelay;
        limit_req zone=sport_api_hot_global burst=1200 nodelay;
        limit_req zone=sport_api_cold_global burst=120 nodelay;
        limit_req zone=sport_api_missing_key_ip burst=20 nodelay;

        fastcgi_cache sport_api_microcache;
        fastcgi_cache_methods GET HEAD;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 10s;
        fastcgi_cache_lock_age 10s;
        fastcgi_cache_background_update on;
        fastcgi_cache_use_stale updating error timeout invalid_header http_500 http_503;
        fastcgi_cache_bypass $api_microcache_bypass;
        fastcgi_no_cache $api_microcache_bypass;
        fastcgi_cache_key "$scheme|$request_method|$host|$uri|$is_args$args|$http_origin|$http_x_api_key|$http_x_timezone|$http_timezone|$http_x_country_code|$http_country_code|$http_cf_ipcountry|$http_cloudfront_viewer_country|$http_x_forwarded_for|$http_x_real_ip|$http_cf_connecting_ip|$http_true_client_ip|$remote_addr";
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
        fastcgi_hide_header X-Accel-Expires;

        add_header X-API-Microcache $upstream_cache_status always;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-sport.sock;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dashboard.hayachoout.space;

    root /var/www/html;
    index home home.html home.php index.php index.html index.htm;

    ssl_certificate /etc/letsencrypt/live/hayachoout.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hayachoout.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(includes|deploy|database|node_modules|\.puppeteer-runtime|\.puppeteer-cache)/ {
        return 404;
    }

    location ~ ^/(config\.php|403\.php|package(?:-lock)?\.json|extract_iframe\.js|puppeteer_runtime\.js)$ {
        return 404;
    }

    location ~ ^/\.monitoring/ {
        return 404;
    }

    location = /stream_proxy.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-sport.sock;
        fastcgi_keep_conn on;
        fastcgi_request_buffering off;
        fastcgi_buffering off;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-sport.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
