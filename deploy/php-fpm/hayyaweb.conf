[hayyaweb]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-hayyaweb.sock
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 12
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.3-fpm-hayyaweb.log
