[sport]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-sport.sock
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 16
pm.start_servers = 4
pm.min_spare_servers = 3
pm.max_spare_servers = 6
pm.max_requests = 500

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.3-fpm-sport.log
